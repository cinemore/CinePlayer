name: macOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-26

    env:
      ASSET_NAME: CinePlayer-macOS-${{ github.ref_name }}.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use HTTPS for GitHub Swift packages
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Download prebuilt frameworks
        run: |
          set -euo pipefail

          curl -L \
            -o Frameworks.zip \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/latest/download/Frameworks.zip"
          unzip -q Frameworks.zip
          test -d Frameworks/CinePlayerSDK.xcframework
          test -d Frameworks/CineFFmpeg.xcframework

      - name: Build Release for macOS
        run: |
          set -euo pipefail

          xcodebuild \
            -project CinePlayer.xcodeproj \
            -scheme CinePlayer \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/DerivedData \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          set -euo pipefail

          APP_PATH="build/DerivedData/Build/Products/Release/CinePlayer.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app not found at $APP_PATH" >&2
            exit 1
          fi

          mkdir -p build/artifacts
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "build/artifacts/${ASSET_NAME}"

      - name: Calculate checksum
        run: shasum -a 256 "build/artifacts/${ASSET_NAME}" | tee "build/artifacts/${ASSET_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinePlayer-macOS-${{ github.ref_name }}
          path: |
            build/artifacts/*.zip
            build/artifacts/*.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/artifacts/*.zip
            build/artifacts/*.sha256
          body: |
            macOS build for CinePlayer.

            This build is currently unsigned and not notarized. On first launch,
            macOS Gatekeeper may show a warning. If you trust this release, open
            it from Finder by Control-clicking the app and choosing Open.

      - name: Update shared Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping shared tap update."
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          sha256="$(cut -d ' ' -f 1 "build/artifacts/${ASSET_NAME}.sha256")"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          asset_url="${repo_url}/releases/download/${tag}/${ASSET_NAME}"

          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/cinemore/homebrew-tap.git" "$tap_dir"
          mkdir -p "$tap_dir/Casks"

          ruby - "$tap_dir/Casks/cineplayer.rb" "$version" "$asset_url" "$sha256" <<'RUBY'
          path, version, asset_url, sha256 = ARGV
          cask = <<~CASK
            cask "cineplayer" do
              version "#{version}"
              sha256 "#{sha256}"

              url "#{asset_url}"
              name "CinePlayer"
              desc "Video player"
              homepage "https://github.com/cinemore/CinePlayer"

              app "CinePlayer.app"

              caveats <<~EOS
                This build is currently unsigned and not notarized. On first launch,
                macOS Gatekeeper may show a warning. If you trust this release, open
                it from Finder by Control-clicking the app and choosing Open.
              EOS
            end
          CASK
          File.write(path, cask)
          RUBY

          cd "$tap_dir"
          if git diff --quiet -- Casks/cineplayer.rb; then
            echo "Shared tap cask already points at $tag"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/cineplayer.rb
          git commit -m "chore: update cineplayer cask for ${tag}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Tap push failed on attempt ${attempt}; rebasing onto origin/main and retrying."
            git pull --rebase origin main
          done

          git push origin HEAD:main
